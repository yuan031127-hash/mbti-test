<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 性格测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  min-height:100vh;color:#e0e0e0;
  display:flex;justify-content:center;align-items:center;
}
.container{width:100%;max-width:680px;padding:20px}

/* Welcome */
.welcome{text-align:center;animation:fadeIn .8s}
.welcome h1{
  font-size:2.4rem;margin-bottom:16px;
  background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.welcome .sub{font-size:1.05rem;color:#94a3b8;line-height:1.7;margin-bottom:8px}
.welcome .meta{font-size:.85rem;color:#64748b;margin-bottom:24px}
.nickname-wrap{margin-bottom:24px}
.nickname-wrap input{
  padding:12px 20px;border-radius:12px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);color:#f1f5f9;font-size:1rem;
  width:260px;text-align:center;outline:none;transition:border .25s;
}
.nickname-wrap input:focus{border-color:#7c3aed}
.nickname-wrap input::placeholder{color:#64748b}

/* Buttons */
.btn{
  display:inline-block;padding:14px 48px;border:none;border-radius:12px;
  font-size:1.05rem;font-weight:600;cursor:pointer;transition:all .25s;
}
.btn-primary{
  background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,.4)}

/* Progress */
.progress-wrap{margin-bottom:28px}
.progress-bar-bg{height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
.progress-bar-fill{
  height:100%;background:linear-gradient(90deg,#7c3aed,#3b82f6);
  border-radius:3px;transition:width .4s ease;
}
.progress-text{text-align:right;font-size:.8rem;color:#64748b;margin-top:6px}

/* Question */
.question-page{animation:fadeIn .5s}
.question-page .dim-label{
  font-size:.8rem;text-transform:uppercase;letter-spacing:2px;
  color:#a78bfa;margin-bottom:12px;
}
.question-page h2{font-size:1.25rem;line-height:1.6;margin-bottom:28px;color:#f1f5f9}
.options{display:flex;flex-direction:column;gap:12px}
.option-btn{
  padding:16px 20px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:12px;
  color:#cbd5e1;font-size:1rem;cursor:pointer;text-align:left;transition:all .2s;
}
.option-btn:hover{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.4);color:#f1f5f9}
.option-btn.selected{background:rgba(124,58,237,.25);border-color:#7c3aed;color:#fff}

/* Result */
.result-page{animation:fadeIn .8s}
.result-header{text-align:center;margin-bottom:28px}
.result-header .type-code{
  font-size:3.2rem;font-weight:800;
  background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.result-header .type-name{font-size:1.3rem;color:#94a3b8}

/* Sections */
.section{
  background:rgba(255,255,255,.04);border-radius:16px;
  padding:24px;margin-bottom:16px;
}
.section h3{font-size:1rem;color:#a78bfa;margin-bottom:12px}
.section p,.section li{line-height:1.8;color:#cbd5e1;font-size:.93rem}
.section ul{padding-left:20px;margin-bottom:8px}
.section li{margin-bottom:4px}

/* Dim bars */
.dim-bars{margin-bottom:4px}
.dim-row{margin-bottom:14px}
.dim-row .label{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:5px;color:#94a3b8}
.dim-row .bar-bg{height:8px;background:#1e293b;border-radius:4px;overflow:hidden;position:relative}
.dim-row .bar-left{position:absolute;left:0;top:0;height:100%;background:#7c3aed;border-radius:4px 0 0 4px;transition:width .6s ease}
.dim-row .bar-right{position:absolute;right:0;top:0;height:100%;background:#3b82f6;border-radius:0 4px 4px 0;transition:width .6s ease}

/* Compatibility */
.compat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.compat-item{text-align:center;padding:10px 6px;border-radius:10px;background:rgba(255,255,255,.04);font-size:.85rem}
.compat-item .level{font-size:.75rem;color:#64748b;margin-top:2px}
.compat-item.good{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3)}
.compat-item.ok{background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.3)}
.compat-item.hard{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3)}

.actions{display:flex;gap:12px;justify-content:center;margin-top:24px}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.15);color:#94a3b8;padding:12px 32px;border-radius:10px;font-size:.95rem;cursor:pointer;transition:all .2s}
.btn-outline:hover{border-color:#a78bfa;color:#e0e0e0}
.btn-small{padding:8px 20px;font-size:.85rem}

.hidden{display:none !important}

/* Loading */
.loading{text-align:center;padding:60px 20px;animation:fadeIn .5s}
.spinner{
  width:40px;height:40px;margin:0 auto 16px;
  border:3px solid rgba(124,58,237,.3);border-top-color:#7c3aed;
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Toast */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:#7c3aed;color:#fff;padding:10px 24px;border-radius:20px;
  font-size:.9rem;z-index:999;animation:fadeIn .3s;box-shadow:0 4px 16px rgba(124,58,237,.4);
}

@media(max-width:480px){
  .container{padding:12px}
  .welcome h1{font-size:1.8rem}
  .result-header .type-code{font-size:2.4rem}
  .section{padding:16px}
}
</style>
</head>
<body>
<div class="container">

<!-- Welcome -->
<div id="welcome" class="welcome">
  <h1>MBTI 性格测试</h1>
  <p class="sub">500 题库随机抽取 100 题，深入探索你的性格类型<br>没有对错之分，选择最符合你真实感受的选项</p>
  <p class="meta">大约需要 8-12 分钟 · 每题 2 个选项</p>
  <div class="nickname-wrap">
    <input type="text" id="nickname" placeholder="输入你的昵称（可选）" maxlength="20">
  </div>
  <button class="btn btn-primary" onclick="startTest()">开始测试</button>
</div>

<!-- Loading -->
<div id="loading" class="loading hidden">
  <div class="spinner"></div>
  <p style="color:#94a3b8">加载题库中...</p>
</div>

<!-- Question -->
<div id="questionPage" class="question-page hidden">
  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>
  <div class="dim-label" id="dimLabel"></div>
  <h2 id="questionText"></h2>
  <div class="options" id="options"></div>
</div>

<!-- Result -->
<div id="resultPage" class="result-page hidden">
  <div class="result-header">
    <div class="type-code" id="typeCode"></div>
    <div class="type-name" id="typeName"></div>
  </div>

  <div class="section" id="descSection">
    <h3>性格概述</h3>
    <p id="typeDesc"></p>
  </div>

  <div class="section">
    <h3>维度倾向</h3>
    <div class="dim-bars" id="dimBars"></div>
  </div>

  <div class="section" id="strengthsSection">
    <h3>核心优势</h3>
    <ul id="strengths"></ul>
  </div>

  <div class="section" id="challengesSection">
    <h3>成长建议</h3>
    <ul id="challenges"></ul>
  </div>

  <div class="section" id="careerSection">
    <h3>职业方向</h3>
    <ul id="career"></ul>
  </div>

  <div class="section" id="relationSection">
    <h3>人际关系</h3>
    <p id="relation"></p>
  </div>

  <div class="section">
    <h3>与你相似的名人</h3>
    <p id="famous"></p>
  </div>

  <div class="section">
    <h3>MBTI 兼容性</h3>
    <div class="compat-grid" id="compatGrid"></div>
  </div>

  <div class="actions">
    <button class="btn btn-outline" onclick="restart()">重新测试</button>
  </div>
</div>
</div>

const typeList = Object.keys(compat);

function getCompatLevel(score) {
  if (score >= 4) return { cls: 'good', label: '很合拍' };
  if (score >= 3) return { cls: 'ok', label: '还不错' };
  return { cls: 'hard', label: '需磨合' };
}

let currentQ = 0, answers = [], selectedQuestions = [];
let dims = ['EI','SN','TF','JP'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startTest() {
  if (!window.MBTI_QUESTIONS.length) {
    showToast('题库还在加载中，请稍等~');
    return;
  }
  const nick = document.getElementById('nickname').value.trim() || '匿名';
  // Select 25 questions per dimension randomly
  selectedQuestions = [];
  dims.forEach(d => {
    const pool = window.MBTI_QUESTIONS.filter(q => q.dim === d);
    const shuffled = shuffle(pool);
    selectedQuestions.push(...shuffled.slice(0, 25));
  });
  // Shuffle all selected questions so dimensions are mixed
  selectedQuestions = shuffle(selectedQuestions);
  currentQ = 0;
  answers = [];

  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('questionPage').classList.remove('hidden');
  showQuestion();
}

function showQuestion() {
  const q = selectedQuestions[currentQ];
  document.getElementById('progressFill').style.width = ((currentQ + 1) / 100 * 100) + '%';
  document.getElementById('progressText').textContent = (currentQ + 1) + ' / 100';
  document.getElementById('dimLabel').textContent = dimNames[q.dim].join(' / ');
  document.getElementById('questionText').textContent = q.text;

  const optsEl = document.getElementById('options');
  optsEl.innerHTML = '';
  q.opts.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = text;
    btn.onclick = () => selectAnswer(i);
    optsEl.appendChild(btn);
  });
  document.getElementById('questionPage').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function selectAnswer(idx) {
  const q = selectedQuestions[currentQ];
  answers.push({ dim: q.dim, score: q.scores[idx] });
  currentQ++;
  if (currentQ < 100) {
    showQuestion();
  } else {
    submitAndShowResult();
  }
}

function submitAndShowResult() {
  const nick = document.getElementById('nickname').value.trim() || '匿名';
  const scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
  answers.forEach(a => { scores[a.dim] += a.score; });

  const type =
    (scores.EI >= 0 ? 'E' : 'I') +
    (scores.SN >= 0 ? 'N' : 'S') +
    (scores.TF >= 0 ? 'F' : 'T') +
    (scores.JP >= 0 ? 'P' : 'J');

  showResult(type, scores);
  submitToSheets(nick, type, scores);
}

function showResult(type, scores) {
  document.getElementById('questionPage').classList.add('hidden');
  document.getElementById('resultPage').classList.remove('hidden');

  const td = typeData[type];
  document.getElementById('typeCode').textContent = type;
  document.getElementById('typeName').textContent = td.name;
  document.getElementById('typeDesc').textContent = td.desc;

  document.getElementById('strengths').innerHTML = td.strengths.map(s => `<li>${s}</li>`).join('');
  document.getElementById('challenges').innerHTML = td.challenges.map(s => `<li>${s}</li>`).join('');
  document.getElementById('career').innerHTML = td.career.map(s => `<li>${s}</li>`).join('');
  document.getElementById('relation').textContent = td.relation;
  document.getElementById('famous').textContent = td.famous;

  // Dimension bars
  const barsEl = document.getElementById('dimBars');
  barsEl.innerHTML = '';
  const dimMeta = [
    { key: 'EI', left: 'E 外向', right: 'I 内向' },
    { key: 'SN', left: 'S 实感', right: 'N 直觉' },
    { key: 'TF', left: 'T 思考', right: 'F 情感' },
    { key: 'JP', left: 'J 判断', right: 'P 感知' },
  ];
  dimMeta.forEach(d => {
    const raw = scores[d.key];
    const maxAbs = 25;
    const pct = Math.min(Math.abs(raw) / maxAbs * 100, 100);
    const leftPct = raw >= 0 ? pct : 0;
    const rightPct = raw < 0 ? pct : 0;
    const row = document.createElement('div');
    row.className = 'dim-row';
    row.innerHTML = `
      <div class="label"><span>${d.left} ${Math.round(leftPct)}%</span><span>${d.right} ${Math.round(rightPct)}%</span></div>
      <div class="bar-bg"><div class="bar-left" style="width:${leftPct}%"></div><div class="bar-right" style="width:${rightPct}%"></div></div>
    `;
    barsEl.appendChild(row);
  });

  // Compat grid
  const compatGrid = document.getElementById('compatGrid');
  compatGrid.innerHTML = '';
  const myIdx = typeList.indexOf(type);
  const myCompat = compat[type];
  typeList.forEach((t, i) => {
    const lvl = getCompatLevel(myCompat[i]);
    const div = document.createElement('div');
    div.className = `compat-item ${lvl.cls}`;
    div.innerHTML = `<div>${t}</div><div class="level">${lvl.label}</div>`;
    compatGrid.appendChild(div);
  });

  document.getElementById('resultPage').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function submitToSheets(nick, type, scores) {
  // Google Sheets 部署后才生效，没配置则静默跳过
  const url = 'https://script.google.com/macros/s/AKfycbz8-你的脚本ID/exec';
  if (url.includes('你的脚本ID')) {
    showToast('请在 apps-script.gs 中按步骤部署 Google Sheets');
    return;
  }
  const data = {
    nickname: nick,
    type: type,
    ei_score: scores.EI,
    sn_score: scores.SN,
    tf_score: scores.TF,
    jp_score: scores.JP,
    ei_pct: Math.round(Math.abs(scores.EI) / 25 * 100),
    sn_pct: Math.round(Math.abs(scores.SN) / 25 * 100),
    tf_pct: Math.round(Math.abs(scores.TF) / 25 * 100),
    jp_pct: Math.round(Math.abs(scores.JP) / 25 * 100),
    time: new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })
  };
  fetch(url, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).catch(() => {}); // Silent fail - Google Sheets is optional
}

function restart() {
  document.getElementById('resultPage').classList.add('hidden');
  document.getElementById('welcome').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}
